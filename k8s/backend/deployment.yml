apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  revisionHistoryLimit: 3
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: tjddms/chaing-backend:128
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret