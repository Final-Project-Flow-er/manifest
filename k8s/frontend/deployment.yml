apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: tjddms/chaing-frontend:latest # 젠킨스가 빌드해서 푸시할 이미지
          ports:
            - containerPort: 80 # Nginx 기본 포트